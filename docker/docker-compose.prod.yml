version: "3.9"

services:
  # --- Infrastructure ---

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sms_app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sms_app}
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-dev.json:/opt/keycloak/data/import/realm-dev.json
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - internal

  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    ports:
      - "8554:8554"   # RTSP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC
      - "9997:9997"   # API
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9997/v3/paths/list || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # --- Reverse Proxy ---

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${SSL_CERT_DIR:-./nginx/ssl}:/etc/nginx/ssl:ro
    depends_on:
      api-control:
        condition: service_healthy
      console-web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:80/ || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # --- Application Services ---

  api-control:
    build:
      context: ..
      dockerfile: apps/api-control/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-sms_app}
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      INTERNAL_SECRET: ${INTERNAL_SECRET:?INTERNAL_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      DATA_PLANE_URL: http://data-plane-worker:3002
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-sms}
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - internal

  console-web:
    build:
      context: ..
      dockerfile: apps/console-web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api-control:3001/api/v1
      NEXT_PUBLIC_KEYCLOAK_URL: http://keycloak:8080
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      api-control:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - internal

  data-plane-worker:
    build:
      context: ..
      dockerfile: apps/data-plane-worker/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      MEDIAMTX_API_URL: http://mediamtx:9997
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      INTERNAL_SECRET: ${INTERNAL_SECRET:?INTERNAL_SECRET is required}
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      redis:
        condition: service_healthy
      mediamtx:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
