services:
  postgres:
    image: postgres:17-alpine
    container_name: sms-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sms_app
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: sms-keycloak
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    command: start-dev --import-realm
    volumes:
      - ./keycloak/realm-dev.json:/opt/keycloak/data/import/realm-dev.json

  mediamtx:
    image: bluenviron/mediamtx:latest-ffmpeg
    container_name: sms-mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"   # RTSP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC (WHEP)
      - "8189:8189/udp" # WebRTC ICE/UDP
      - "9997:9997"   # Control API
      - "9998:9998"   # Metrics
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml
      - thumbnails_data:/thumbnails
      - recordings_data:/recordings

volumes:
  postgres_data:
  redis_data:
  thumbnails_data:
  recordings_data:
